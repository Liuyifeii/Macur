base_temperature: 1.2
baseline_window_size: 4000

macro_target_stage2: 0.4
macro_target_stage3: 0.5
macro_target_stage4: 0.6
macro_target_stage5: 0.7
unique_target_ratio: 0.35
max_repeat_epochs_per_stage: 4


