vocab_file: data/artifacts/vocab_smiles.json
pretrain_checkpoint: outputs/checkpoints/final
save_dir_root: outputs/ppo_curriculum_checkpoints
steps_per_stage: 1000
batch_size: 8
mini_batch_size: 4
learning_rate: 1e-5
init_kl_coef: 0.3
target_kl: 0.02
gen_max_length: 128
top_k: 50
